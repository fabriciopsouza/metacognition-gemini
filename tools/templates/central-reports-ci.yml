# central-reports-ci.yml — CI do repo central `metacognition-exec-reports` (ADR-063/064).
#
# COMO USAR (ação do dono, 1x): copie para `.github/workflows/ci.yml` no repo central público;
# Settings → Branches → branch protection da `main` exigindo o check "validate-reports";
# Settings → General → "Allow auto-merge". SÓ ENTÃO um PR que passa o check auto-mergeia.
#
# 2 barreiras (defesa-em-profundidade sobre o fail-closed CLIENT-SIDE do learnings_public):
#  (1) APPEND-ONLY: rejeita PR que MODIFICA/DELETA report existente (só ADIÇÃO permitida) — anti-tamper
#      cross-pseudônimo: ninguém apaga/edita o report de outro.
#  (2) ANTI-PII GENÉRICO (e-mail/CPF/CNPJ) nos arquivos ADICIONADOS. NÃO flag aspas-longas: o report
#      é NARRATIVO (prosa anonimizada com citações legítimas) — aspas≠PII aqui (≠ tier estruturado).
#  A `sensitive-denylist` PRIVADA NÃO entra aqui (publicá-la vazaria nomes — ADR-020/063); só PII genérico.
#  Bash puro (sem heredoc — robusto no Actions).

name: validate-reports
on:
  pull_request:
    paths: ['reports/**']

permissions:
  contents: read

jobs:
  validate-reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Append-only + anti-PII generico nos relatorios do PR
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -e
          BASE=$(git merge-base "origin/$BASE_REF" HEAD)
          # (1) APPEND-ONLY: em reports/**, só ADIÇÃO (status A). Modificar/Deletar (M/D/R) reprova.
          TAMPER=$(git diff --name-status "$BASE" HEAD -- 'reports/**' | grep -vE '^A' || true)
          if [ -n "$TAMPER" ]; then
            echo "REPROVADO (append-only): PR modifica/deleta report existente (anti-tamper):"
            echo "$TAMPER"
            exit 1
          fi
          # (2) ANTI-PII nos arquivos ADICIONADOS.
          FILES=$(git diff --name-only --diff-filter=A "$BASE" HEAD -- 'reports/**' || true)
          FAIL=0
          for f in $FILES; do
            [ -f "$f" ] || continue
            if grep -nE '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}|[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}|[0-9]{2}\.[0-9]{3}\.[0-9]{3}/[0-9]{4}-[0-9]{2}' "$f"; then
              echo "REPROVADO: possivel PII/texto-livre em $f"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "0" ]; then echo "OK: relatorios append-only, sem PII generica."; fi
          exit $FAIL
